name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: npx gh-pages -d dist -r "https://x-access-token:${GITHUB_TOKEN}@github.com/pallavibiswas/prompting_for_performance.git"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}